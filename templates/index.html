<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">{{SOCIETY_NAME}} · {{YEAR}}</p>
          <h1>{{TITLE}}</h1>
          <p class="hero-subtitle">{{SUBTITLE}}</p>
        </div>
        <div class="hero-meta">
          <span>Generated (IST)</span>
          <strong>{{GENERATED_AT}}</strong>
        </div>
      </header>

      <main>
        <section class="summary-grid public-grid" id="publicSummaryGrid"></section>

        <section class="panel progress-panel">
          <div>
            <p class="panel-kicker">Public Overview</p>
            <h2>Goal progress</h2>
          </div>
          <div class="progress-figure">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-caption">
              <strong id="progressPercent"></strong>
              <span id="progressText"></span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Expenses</p>
              <h2>Recent expenditure</h2>
            </div>
          </div>
          <div id="deductionsTable"></div>
        </section>
      </main>
    </div>

    <script>
      window.dashboardData = {{PAYLOAD}};
    </script>
    <script src="assets/public.js"></script>
  </body>
</html>
